<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Voice Notes To Content - Native iOS Mockups</title>
    <style>
      body {
        margin: 0;
        background: #f2f2f7;
      }

      svg {
        display: block;
        width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1800" viewBox="0 0 2400 1800">
  <rect width="2400" height="1800" fill="#f2f2f7"/>
  <text x="1200" y="90" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#111114">AI Voice Notes To Content</text>
  <text x="1200" y="138" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="25" font-weight="500" fill="#5c5c62">Native iOS mockups: recording first, no timer, SF Symbols-style controls</text>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .font { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif; }
      .display { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; }
      .phone { fill: #f2f2f7; stroke: #d1d1d6; stroke-width: 1; filter: url(#shadow); }
      .island { fill: #000000; }
      .label { fill: #111114; }
      .secondary { fill: #5c5c62; }
      .tertiary { fill: #8e8e93; }
      .group { fill: #ffffff; stroke: #d1d1d6; stroke-width: 1; }
      .soft { fill: #e5e5ea; }
      .red { fill: #e94b3c; }
      .redsoft { fill: #f8d7d2; }
      .blue { fill: #007aff; }
    </style>
  </defs>

  <!-- phone helper geometry manually repeated -->
  <g transform="translate(90 210)">
    <rect class="phone" width="393" height="852" rx="44"/>
    <rect class="island" x="151" y="16" width="91" height="27" rx="14"/>
    <rect x="156" y="832" width="81" height="5" rx="3" fill="#000" opacity=".72"/>
    <text class="font label" x="24" y="88" font-size="17" font-weight="600">Voice Notes</text>
    <circle cx="351" cy="82" r="22" fill="#fff" stroke="#d1d1d6"/>

    <circle cx="351" cy="82" r="2.8" fill="#111114"/>
    <circle cx="359" cy="82" r="2.8" fill="#111114"/>
    <circle class="redsoft" cx="196" cy="388" r="92"/>
    <circle class="red" cx="196" cy="388" r="72"/>
    <rect x="185" y="355" width="22" height="50" rx="11" fill="#fff"/>
    <rect x="166" y="399" width="60" height="9" rx="4.5" fill="#fff"/>

    <text class="display label" x="196" y="910" font-size="25" font-weight="700" text-anchor="middle">Home</text>
  </g>

  <g transform="translate(560 210)">
    <rect class="phone" width="393" height="852" rx="44"/>
    <rect class="island" x="151" y="16" width="91" height="27" rx="14"/>
    <rect x="156" y="832" width="81" height="5" rx="3" fill="#000" opacity=".72"/>
    <text class="font label" x="24" y="88" font-size="17" font-weight="600">Recording</text>
    <circle cx="351" cy="82" r="22" fill="#fff" stroke="#d1d1d6"/>
    <circle cx="343" cy="82" r="2.8" fill="#111114"/>
    <circle cx="351" cy="82" r="2.8" fill="#111114"/>
    <circle cx="359" cy="82" r="2.8" fill="#111114"/>

    <circle class="red" cx="196" cy="388" r="72"/>
    <rect x="174" y="366" width="44" height="44" rx="10" fill="#fff"/>

    <text class="display label" x="196" y="910" font-size="25" font-weight="700" text-anchor="middle">Recording</text>

    <rect x="156" y="832" width="81" height="5" rx="3" fill="#000" opacity=".72"/>

    <text class="display label" x="196" y="910" font-size="25" font-weight="700" text-anchor="middle">Processing</text>
  </g>

  <g transform="translate(1500 210)">

    <rect class="island" x="151" y="16" width="91" height="27" rx="14"/>
    <rect x="156" y="832" width="81" height="5" rx="3" fill="#000" opacity=".72"/>

      <text class="font label" x="58" y="36" font-size="16" font-weight="500">Note</text>

      <text class="tertiary" x="332" y="38" font-size="26">›</text>

      <text x="26" y="37" font-size="19" fill="#34a853" text-anchor="middle">✓</text>
      <text class="tertiary" x="332" y="38" font-size="26">›</text>

    <text class="display label" x="196" y="578" font-size="25" font-weight="700" text-anchor="middle">Type Sheet</text>
  </g>

  <g transform="translate(560 1180)">
    <rect class="phone" width="393" height="520" rx="44"/>
    <rect class="island" x="151" y="16" width="91" height="27" rx="14"/>
    <text class="tertiary" x="28" y="88" font-size="30">‹</text>
    <text class="font label" x="196" y="88" font-size="17" font-weight="600" text-anchor="middle">Email</text>

    <line x1="40" y1="256" x2="353" y2="256" stroke="#d1d1d6"/>
    <text class="font label" x="40" y="292" font-size="16">Hi Sarah, thanks again for the call...</text>
    <rect x="40" y="430" width="145" height="48" rx="24" fill="#e5e5ea"/>

    <text class="display label" x="196" y="578" font-size="25" font-weight="700" text-anchor="middle">Edit</text>

    <rect class="phone" width="393" height="520" rx="44"/>
    <rect class="island" x="151" y="16" width="91" height="27" rx="14"/>
    <text class="font label" x="24" y="88" font-size="17" font-weight="600">Voice Notes</text>
    <circle class="redsoft" cx="196" cy="225" r="76"/>
    <circle class="red" cx="196" cy="225" r="55"/>
    <rect class="group" x="0" y="310" width="393" height="210" rx="30"/>
    <rect x="162" y="324" width="69" height="5" rx="3" fill="#d1d1d6"/>

    <text class="font label" x="40" y="426" font-size="16" font-weight="600">Updated proposal email</text>
    <text class="font secondary" x="40" y="451" font-size="13">Email · Today</text>
    <text class="display label" x="196" y="578" font-size="25" font-weight="700" text-anchor="middle">History</text>
  </g>

    <rect class="phone" width="393" height="520" rx="44"/>
    <rect class="island" x="151" y="16" width="91" height="27" rx="14"/>
    <text class="display label" x="28" y="100" font-size="34" font-weight="700">Settings</text>
    <text class="font secondary" x="28" y="162" font-size="12" font-weight="700">AUDIO</text>

    <text class="font tertiary" x="350" y="218" font-size="26">›</text>
    <rect x="34" y="195" width="32" height="32" rx="8" fill="#e94b3c"/>
    <text x="50" y="217" font-size="17" fill="#fff" text-anchor="middle">⌫</text>
    <rect class="group" x="20" y="250" width="353" height="58" rx="14"/>
    <text class="font label" x="78" y="285" font-size="16" font-weight="500">Start/stop cues</text>
    <text class="font tertiary" x="350" y="286" font-size="26">›</text>
    <rect x="34" y="263" width="32" height="32" rx="8" fill="#007aff"/>
    <text x="50" y="285" font-size="17" fill="#fff" text-anchor="middle">◉</text>
    <text class="display label" x="196" y="578" font-size="25" font-weight="700" text-anchor="middle">Settings</text>
  </g>
</svg>

</html>
